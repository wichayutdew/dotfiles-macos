# yaml-language-server: $schema=/Users/wphongphanpa/repositories/personal/pi-workflows/schemas/workflow.schema.json
version: 1
id: ticket
command: ticket
description: Read a Jira ticket, plan, implement, and independently verify it
start: plan
maxStepVisits: 8
summaryMaxChars: 30000
steps:
  plan:
    title: Read Jira evidence and plan
    prompt:
      file: steps/ticket/plan.md
    subagent:
      agent: pi-workflows.step
      context: fresh
      timeoutMs: 1200000
      turnBudget:
        maxTurns: 35
        graceTurns: 3
      toolBudget:
        soft: 80
        hard: 140
        block: "*"
    permissions:
      tools: [ read, ls, bash, mcp ]
      mcp:
        - atlassian/getAccessibleAtlassianResources
        - atlassian/getJiraIssue
        - atlassian/getJiraIssueRemoteIssueLinks
        - atlassian/searchJiraIssuesUsingJql
        - context7/resolve-library-id
        - context7/query-docs
        - sourcegraph/code_finder
        - sourcegraph/commit_search
        - sourcegraph/diff_search
        - sourcegraph/keyword_search
        - sourcegraph/list_files
        - sourcegraph/list_repos
        - sourcegraph/nls_search
        - sourcegraph/read_file
        - gh_grep/searchGitHub
      extensions: [ plannotator, pi-web-tools ]
      skills: [ caveman, jira-ticket, coding-standards, brainstorming, writing-plans, using-git-worktrees ]
      bash:
        mode: allow-list
        allow:
          - executable: rg
          - executable: ls
          - executable: pwd
          - executable: git
            argsPrefixes: [ [ status ], [ diff ], [ log ], [ show ], [ rev-parse ], [ ls-files ], [ branch, --show-current ], [ worktree, list ], [ remote, -v ], [ blame ], [ show-ref ], [ cat-file ] ]
    requires:
      tools: [ read, ls, bash, mcp ]
      extensions: [ plannotator, pi-web-tools ]
      skills: [ caveman, jira-ticket, coding-standards, brainstorming, writing-plans, using-git-worktrees ]
    gate:
      provider: plannotator
      submitOutcome: submit
      approvedOutcome: approved
      rejectedOutcome: changes-requested
      timeoutMs: 10000
    transitions:
      approved: implement
      changes-requested: plan
      blocked: $pause
  implement:
    title: Implement the approved Jira plan
    prompt:
      file: steps/ticket/implement.md
    subagent:
      agent: pi-workflows.step
      context: fresh
      timeoutMs: 7200000
      artifacts: true
    permissions:
      tools: [ read, ls, bash, edit, write, mcp ]
      mcp:
        - atlassian/getAccessibleAtlassianResources
        - atlassian/getJiraIssue
        - atlassian/getJiraIssueRemoteIssueLinks
        - atlassian/searchJiraIssuesUsingJql
        - context7/resolve-library-id
        - context7/query-docs
        - sourcegraph/code_finder
        - sourcegraph/commit_search
        - sourcegraph/diff_search
        - sourcegraph/keyword_search
        - sourcegraph/list_files
        - sourcegraph/list_repos
        - sourcegraph/nls_search
        - sourcegraph/read_file
        - gh_grep/searchGitHub
      skills: [ caveman, jira-ticket, coding-standards, executing-plans, systematic-debugging, test-driven-development, verification-before-completion, receiving-code-review ]
      bash:
        mode: allow-list
        allow:
          - executable: rg
          - executable: ls
          - executable: pwd
          - executable: git
            argsPrefixes: [ [ status ], [ diff ], [ log ], [ show ], [ rev-parse ], [ ls-files ], [ branch, --show-current ], [ worktree, list ], [ remote, -v ], [ blame ], [ show-ref ], [ cat-file ] ]
        approvedSources: [ verification-worker ]
    requires:
      tools: [ read, ls, bash, edit, write, mcp ]
      skills: [ jira-ticket, coding-standards, executing-plans, systematic-debugging, test-driven-development, verification-before-completion, receiving-code-review ]
    transitions:
      ready: verify
      blocked: $pause
  verify:
    title: Independently verify Jira work
    prompt:
      file: steps/ticket/verify.md
    subagent:
      agent: pi-workflows.step
      context: fresh
      model: openai-gateway/gpt-5.6-sol
      timeoutMs: 3600000
      turnBudget:
        maxTurns: 40
        graceTurns: 3
      toolBudget:
        soft: 120
        hard: 200
        block: "*"
    permissions:
      tools: [ read, ls, bash, mcp ]
      mcp:
        - atlassian/getAccessibleAtlassianResources
        - atlassian/getJiraIssue
        - atlassian/getJiraIssueRemoteIssueLinks
        - atlassian/searchJiraIssuesUsingJql
        - context7/resolve-library-id
        - context7/query-docs
        - sourcegraph/code_finder
        - sourcegraph/commit_search
        - sourcegraph/diff_search
        - sourcegraph/keyword_search
        - sourcegraph/list_files
        - sourcegraph/list_repos
        - sourcegraph/nls_search
        - sourcegraph/read_file
        - gh_grep/searchGitHub
      skills: [ caveman, jira-ticket, coding-standards, verification-before-completion, requesting-code-review ]
      bash:
        mode: allow-list
        allow:
          - executable: rg
          - executable: ls
          - executable: pwd
          - executable: git
            argsPrefixes: [ [ status ], [ diff ], [ log ], [ show ], [ rev-parse ], [ ls-files ], [ branch, --show-current ], [ worktree, list ], [ remote, -v ], [ blame ], [ show-ref ], [ cat-file ] ]
        approvedSources: [ verification-reviewer ]
    requires:
      tools: [ read, ls, bash, mcp ]
      skills: [ jira-ticket, coding-standards, verification-before-completion, requesting-code-review ]
    transitions:
      passed: $done
      failed: implement
      blocked: $pause
