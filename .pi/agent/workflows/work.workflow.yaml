# yaml-language-server: $schema=/Users/wphongphanpa/repositories/personal/pi-workflows/schemas/workflow.schema.json
version: 1
id: work
command: work
description: Plan, implement, and independently verify local work
start: plan
maxStepVisits: 8
summaryMaxChars: 30000
steps:
  plan:
    title: Explore and plan local work
    prompt:
      file: steps/work/plan.md
    subagent:
      agent: scout
      context: fresh
      timeoutMs: 1200000
      turnBudget:
        maxTurns: 30
        graceTurns: 3
      toolBudget:
        soft: 60
        hard: 100
        block: "*"
    permissions:
      tools: [ read, ls, bash, mcp ]
      mcp:
        - context7/resolve-library-id
        - context7/query-docs
        - sourcegraph/code_finder
        - sourcegraph/commit_search
        - sourcegraph/diff_search
        - sourcegraph/keyword_search
        - sourcegraph/list_files
        - sourcegraph/list_repos
        - sourcegraph/nls_search
        - sourcegraph/read_file
        - gh_grep/searchGitHub
      extensions: [ plannotator, pi-web-tools ]
      skills: [ caveman, brainstorming, writing-plans, using-git-worktrees, coding-standards ]
      bash:
        mode: allow-list
        allow:
          - executable: rg
          - executable: ls
          - executable: pwd
          - executable: git
            argsPrefixes: [ [ status ], [ diff ], [ log ], [ show ], [ rev-parse ], [ ls-files ], [ branch, --show-current ], [ worktree, list ], [ remote, -v ], [ blame ], [ show-ref ], [ cat-file ] ]
    requires:
      tools: [ read, ls, bash, mcp ]
      extensions: [ plannotator, pi-web-tools ]
      skills: [ caveman, brainstorming, writing-plans, using-git-worktrees, coding-standards ]
    gate:
      provider: plannotator
      submitOutcome: submit
      approvedOutcome: approved
      rejectedOutcome: changes-requested
      timeoutMs: 10000
    transitions:
      approved: implement
      changes-requested: plan
      blocked: $pause
  implement:
    title: Implement the approved local plan
    prompt:
      file: steps/work/implement.md
    subagent:
      agent: worker
      context: fresh
      timeoutMs: 7200000
      artifacts: true
    permissions:
      tools: [ read, ls, bash, edit, write, mcp ]
      mcp:
        - context7/resolve-library-id
        - context7/query-docs
        - sourcegraph/code_finder
        - sourcegraph/commit_search
        - sourcegraph/diff_search
        - sourcegraph/keyword_search
        - sourcegraph/list_files
        - sourcegraph/list_repos
        - sourcegraph/nls_search
        - sourcegraph/read_file
        - gh_grep/searchGitHub
      skills: [ caveman, coding-standards, executing-plans, systematic-debugging, test-driven-development, verification-before-completion, receiving-code-review ]
      bash:
        mode: allow-list
        allow:
          - executable: rg
          - executable: ls
          - executable: pwd
          - executable: git
            argsPrefixes: [ [ status ], [ diff ], [ log ], [ show ], [ rev-parse ], [ ls-files ], [ branch, --show-current ], [ worktree, list ], [ remote, -v ], [ blame ], [ show-ref ], [ cat-file ] ]
        approvedSources: [ verification-worker ]
    requires:
      tools: [ read, ls, bash, edit, write, mcp ]
      skills: [ coding-standards, executing-plans, systematic-debugging, test-driven-development, verification-before-completion, receiving-code-review ]
    transitions:
      ready: verify
      blocked: $pause
  verify:
    title: Independently verify local work
    prompt:
      file: steps/work/verify.md
    subagent:
      agent: reviewer
      context: fresh
      timeoutMs: 3600000
      turnBudget:
        maxTurns: 40
        graceTurns: 3
      toolBudget:
        soft: 120
        hard: 200
        block: "*"
    permissions:
      tools: [ read, ls, bash, mcp ]
      mcp:
        - context7/resolve-library-id
        - context7/query-docs
        - sourcegraph/code_finder
        - sourcegraph/commit_search
        - sourcegraph/diff_search
        - sourcegraph/keyword_search
        - sourcegraph/list_files
        - sourcegraph/list_repos
        - sourcegraph/nls_search
        - sourcegraph/read_file
        - gh_grep/searchGitHub
      skills: [ caveman, coding-standards, verification-before-completion, requesting-code-review ]
      bash:
        mode: allow-list
        allow:
          - executable: rg
          - executable: ls
          - executable: pwd
          - executable: git
            argsPrefixes: [ [ status ], [ diff ], [ log ], [ show ], [ rev-parse ], [ ls-files ], [ branch, --show-current ], [ worktree, list ], [ remote, -v ], [ blame ], [ show-ref ], [ cat-file ] ]
        approvedSources: [ verification-reviewer ]
    requires:
      tools: [ read, ls, bash, mcp ]
      skills: [ coding-standards, verification-before-completion, requesting-code-review ]
    transitions:
      passed: $done
      failed: implement
      blocked: $pause
